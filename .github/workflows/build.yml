name: Build macOS ARM DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version written to the app bundle. Leave empty to use Info.plist.
        required: false
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-15
    env:
      BUILD_ARCH: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Info.plist)"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Select Xcode 26
        run: |
          find /Applications -maxdepth 1 -name 'Xcode_26*.app' -type d | sort | tail -n 1 | \
            xargs -I{} sudo xcode-select -s {}/Contents/Developer

      - name: Install DMG tooling
        run: |
          command -v create-dmg >/dev/null 2>&1 || brew install create-dmg

      - name: Fix upstream entitlements
        run: |
          python3 -c "
import plistlib
e=plistlib.load(open('CodeIsland.entitlements','rb'))
seen=set()
for k in list(e.keys()):
  if k in seen: del e[k]
  else: seen.add(k)
plistlib.dump(e,open('CodeIsland.entitlements','wb'))
"
          echo "SKIP_SIGN=1" >> "$GITHUB_ENV"
          echo "SKIP_NOTARIZE=1" >> "$GITHUB_ENV"

      - name: Build DMG
        run: ./scripts/build-dmg.sh "$VERSION"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CodeIsland-macos-arm64-dmg
          path: .build/CodeIsland.dmg
          if-no-files-found: error
