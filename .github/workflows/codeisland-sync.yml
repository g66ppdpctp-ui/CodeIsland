name: Sync upstream and build

on:
  workflow_dispatch:
    inputs:
      force_build:
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '13 */6 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: upstream
        run: |
          echo "tag=$(curl -sL https://api.github.com/repos/wxtsky/CodeIsland/releases/latest | jq -r .tag_name)" >> "$GITHUB_OUTPUT"

      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"
          if [ "${{ github.event.inputs.force_build }}" = "true" ]; then echo "exists=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if gh release view "$TAG" 2>/dev/null; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; fi

      - if: steps.check.outputs.exists == 'false'
        run: |
          git remote add upstream https://github.com/wxtsky/CodeIsland.git
          git fetch upstream main
          git merge --ff-only upstream/main

      - if: steps.check.outputs.exists == 'false'
        run: |
          XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' -type d | sort | tail -n 1)"
          if [ -z "$XCODE_APP" ]; then
            XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode_*.app' -type d | sort | tail -n 1)"
          fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer" || true

      - if: steps.check.outputs.exists == 'false'
        run: |
          command -v create-dmg >/dev/null 2>&1 || brew install create-dmg

      - if: steps.check.outputs.exists == 'false'
        run: |
          python3 -c "
import plistlib
e=plistlib.load(open('CodeIsland.entitlements','rb'))
seen=set()
for k in list(e.keys()):
  if k in seen: del e[k]
  else: seen.add(k)
plistlib.dump(e,open('CodeIsland.entitlements','wb'))
"
          TAG="${{ steps.upstream.outputs.tag }}"
          VERSION="${TAG#v}"
          SKIP_SIGN=1 SKIP_NOTARIZE=1 BUILD_ARCH=arm64 \
            ./scripts/build-dmg.sh "$VERSION"

      - if: steps.check.outputs.exists == 'false'
        id: sha
        run: |
          echo "sha256=$(sha256sum .build/CodeIsland.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.upstream.outputs.tag }}" \
            .build/CodeIsland.dmg \
            --title "${{ steps.upstream.outputs.tag }}" \
            --notes "SHA256: ${{ steps.sha.outputs.sha256 }}" \
            --target "$(git rev-parse HEAD)"
