name: upstream-auto
on:
  workflow_dispatch:
  schedule:
    - cron: '13 */6 * * *'
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: upstream
        run: |
          TAG=$(curl -sL https://api.github.com/repos/wxtsky/CodeIsland/releases/latest | jq -r .tag_name)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=${{ steps.upstream.outputs.tag }}
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then echo "exists=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          if gh release view "$TAG" 2>/dev/null; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; fi
      - if: steps.check.outputs.exists == 'false'
        run: |
          git remote add upstream https://github.com/wxtsky/CodeIsland.git
          git fetch upstream main
          git merge --ff-only upstream/main
      - if: steps.check.outputs.exists == 'false'
        run: |
          X=$(find /Applications -maxdepth 1 -name 'Xcode_*.app' -type d | sort | tail -n 1)
          [ -n "$X" ] && sudo xcode-select -s "$X/Contents/Developer" || true
      - if: steps.check.outputs.exists == 'false'
        run: brew install create-dmg 2>/dev/null || true
      - if: steps.check.outputs.exists == 'false'
        run: |
          python3 -c "import plistlib,sys; e=plistlib.load(open(sys.argv[1],'rb')); s=set(); [s.add(k) or (e.pop(k) if k in s else None) for k in list(e.keys())]; plistlib.dump(e,open(sys.argv[1],'wb'))" CodeIsland.entitlements
          SKIP_SIGN=1 SKIP_NOTARIZE=1 BUILD_ARCH=arm64 \
            ./scripts/build-dmg.sh "${{ steps.upstream.outputs.version }}"
      - id: sha
        if: steps.check.outputs.exists == 'false'
        run: echo "sha256=$(sha256sum .build/CodeIsland.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"
      - if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.upstream.outputs.tag }}" .build/CodeIsland.dmg \
            --title "${{ steps.upstream.outputs.tag }}" \
            --notes "SHA256: ${{ steps.sha.outputs.sha256 }}" \
            --target "$(git rev-parse HEAD)"
