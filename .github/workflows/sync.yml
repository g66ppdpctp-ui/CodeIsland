name: Sync upstream and build

on:
  schedule:
    - cron: '13 */6 * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: Force rebuild even if already released
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: upstream
        run: |
          LATEST=$(curl -sL https://api.github.com/repos/wxtsky/CodeIsland/releases/latest | jq -r .tag_name)
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "version=${LATEST#v}" >> "$GITHUB_OUTPUT"

      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event.inputs.force_build }}" = "true" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          elif gh release view "${{ steps.upstream.outputs.tag }}" 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.exists == 'false'
        run: |
          git remote add upstream https://github.com/wxtsky/CodeIsland.git
          git fetch upstream main
          git merge --ff-only upstream/main

      - if: steps.check.outputs.exists == 'false'
        run: |
          XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode_26*.app' -type d | sort | tail -n 1)"
          if [ -z "$XCODE_APP" ]; then
            XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode_*.app' -type d | sort | tail -n 1)"
          fi
          if [ -z "$XCODE_APP" ]; then exit 1; fi
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"

      - if: steps.check.outputs.exists == 'false'
        run: |
          if ! command -v create-dmg >/dev/null 2>&1; then
            brew install create-dmg
          fi

      - if: steps.check.outputs.exists == 'false'
        run: |
          python3 -c "
import plistlib
e=plistlib.load(open('CodeIsland.entitlements','rb'))
seen=set()
for k in list(e.keys()):
  if k in seen: del e[k]
  else: seen.add(k)
plistlib.dump(e,open('CodeIsland.entitlements','wb'))
"
          SKIP_SIGN=1 SKIP_NOTARIZE=1 BUILD_ARCH=arm64 \
            ./scripts/build-dmg.sh "${{ steps.upstream.outputs.version }}"

      - if: steps.check.outputs.exists == 'false'
        run: |
          test "$(lipo -archs .build/dmg-staging/CodeIsland.app/Contents/MacOS/CodeIsland)" = "arm64"
          ls -lh .build/CodeIsland.dmg

      - if: steps.check.outputs.exists == 'false'
        id: sha
        run: |
          echo "sha256=$(sha256sum .build/CodeIsland.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.upstream.outputs.tag }}" \
            .build/CodeIsland.dmg \
            --title "${{ steps.upstream.outputs.tag }}" \
            --notes "SHA256: ${{ steps.sha.outputs.sha256 }}" \
            --target "$(git rev-parse HEAD)"
