name: Sync upstream and build

on:
  workflow_dispatch:
    inputs:
      force_build:
        description: Force rebuild even if already released
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '13 */6 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: upstream
        run: |
          echo "tag=$(curl -sL https://api.github.com/repos/wxtsky/CodeIsland/releases/latest | jq -r .tag_name)" >> "$GITHUB_OUTPUT"

      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$FORCE" = "true" ]; then echo "exists=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          gh release view "$TAG" 2>/dev/null && echo "exists=true" >> "$GITHUB_OUTPUT" || echo "exists=false" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ steps.upstream.outputs.tag }}
          FORCE: ${{ github.event.inputs.force_build }}

      - if: steps.check.outputs.exists == 'false'
        run: |
          git remote add upstream https://github.com/wxtsky/CodeIsland.git
          git fetch upstream main
          git merge --ff-only upstream/main

      - if: steps.check.outputs.exists == 'false'
        run: |
          find /Applications -maxdepth 1 -name 'Xcode_26*.app' -type d | sort | tail -n 1 | \
            xargs -I{} sudo xcode-select -s {}/Contents/Developer || true

      - if: steps.check.outputs.exists == 'false'
        run: |
          command -v create-dmg >/dev/null 2>&1 || brew install create-dmg

      - if: steps.check.outputs.exists == 'false'
        run: |
          python3 -c "
import plistlib
e=plistlib.load(open('CodeIsland.entitlements','rb'))
seen=set()
for k in list(e.keys()):
  if k in seen: del e[k]
  else: seen.add(k)
plistlib.dump(e,open('CodeIsland.entitlements','wb'))
"
          TAG="${{ steps.upstream.outputs.tag }}"
          VERSION="${TAG#v}"
          SKIP_SIGN=1 SKIP_NOTARIZE=1 BUILD_ARCH=arm64 \
            ./scripts/build-dmg.sh "$VERSION"

      - if: steps.check.outputs.exists == 'false'
        id: sha
        run: |
          echo "sha256=$(sha256sum .build/CodeIsland.dmg | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$TAG" .build/CodeIsland.dmg \
            --title "$TAG" \
            --notes "SHA256: $SHA256" \
            --target "$(git rev-parse HEAD)"
        env:
          TAG: ${{ steps.upstream.outputs.tag }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
